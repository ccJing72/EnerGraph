# Agent 配置文件（默认值，优先级: 环境变量 > 此文件）
# 实际运行时由 .env 中的 LLM_PROVIDER / DEEPSEEK_MODEL 等覆盖

# 模型配置
model:
  provider: "openai"          # .env LLM_PROVIDER 覆盖: deepseek | openai | anthropic
  name: "gpt-4o"              # .env DEEPSEEK_MODEL / OPENAI_MODEL / ANTHROPIC_MODEL 覆盖
  temperature: 0.7
  max_tokens: 2000

# Agent 配置
agent:
  max_iterations: 10          # .env AGENT_MAX_ITERATIONS 覆盖
  timeout: 60

# RAG 检索配置
rag:
  top_k: 3                    # 检索返回条数（Phase 3 从 5 降至 3，减少冗余）
  confidence_threshold: 0.6   # 置信度阈值，top-1 distance 超过此值标记 low_confidence
  dedup_similarity: 0.98      # 去重相似度阈值，cosine_sim > 此值的重复片段被剔除（0.98 = 几乎完全相同才去重）

# 工具列表（代码中通过 src/tools/__init__.py 的 TOOL_REGISTRY 注册，此处仅作记录）
# 当前工具：parse_business_intent, query_timedit_forecast, verify_physics_consistency,
#           fetch_aidc_cooling_status, query_hvac_knowledge

# 输出配置
output:
  language: "zh"
  format: "markdown"

# API 服务配置
api:
  host: "0.0.0.0"                   # .env API_HOST 覆盖
  port: 8000                        # .env API_PORT 覆盖
  cors_origins: ["*"]               # .env API_CORS_ORIGINS 覆盖（逗号分隔），生产环境应限定具体域名
  api_key: ""                       # .env API_KEY 覆盖；空 = 不启用鉴权（开发模式），填值后前端需带 Bearer token
